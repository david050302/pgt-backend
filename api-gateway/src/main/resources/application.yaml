server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://localhost:8888"
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: ms-administration-auth
          uri: lb://ms-administration
          predicates:
            - Path=/api/v1/auth/**
        
        - id: ms-administration-users
          uri: lb://ms-administration
          predicates:
            - Path=/api/v1/users/**
        
        - id: ms-administration-accounts
          uri: lb://ms-administration
          predicates:
            - Path=/api/v1/accounts/**

        - id: ms-administration-roles
          uri: lb://ms-administration
          predicates:
            - Path=/api/v1/roles/**
        
        - id: ms-inventory-locations
          uri: lb://ms-inventory
          predicates:
            - Path=/api/v1/locations/**

        - id: ms-inventory-warehouses
          uri: lb://ms-inventory
          predicates:
            - Path=/api/v1/warehouses/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true
    ip-address: 127.0.0.1